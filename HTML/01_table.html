<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <h1>Welcome Back..</h1>
    <table border="2">
        <caption>Food Items</caption>
        <colgroup>
            <col style="background-color: lightcoral;">
            <col style="background-color: lightcyan;">
            <col style="background-color: lightgray;">
        </colgroup>
        <thead>
            <tr>
                <th>Name</th>
                <th>Queantity</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Maggie</td>
                <td>30</td>
                <td>110</td>
            </tr>
            <tr>
                <td>Lays</td>
                <td>20</td>
                <td>100</td>
            </tr>
            <tr>
                <td>Kurkure</td>
                <td>40</td>
                <td>200</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <th colspan="2">Total price</th>
                <th>410</th>
            </tr>
        </tfoot>
    </table>
</body>
</html>
